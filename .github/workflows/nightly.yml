# Nightly stock screening pipeline
# Preferred: ~03:00 UK Mon–Fri → email aimed before ~05:00
# Two UTC crons cover BST/GMT only. cancel-in-progress avoids queued pile-ups.
# Python gate: once per weekday; late starts still run.

name: Nightly Pipeline

on:
  schedule:
    # 03:00 UK = 02:00 UTC (BST) / 03:00 UTC (GMT)
    - cron: "0 2 * * 1-5"
    - cron: "0 3 * * 1-5"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max stocks to process (empty = full universe)"
        required: false
        type: string
      force:
        description: "Run even outside Mon-Fri morning window"
        required: false
        type: boolean
        default: true

concurrency:
  group: nightly-pipeline
  cancel-in-progress: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run nightly pipeline
        id: pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GITHUB_ACTIONS: "true"
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.force }}" = "true" ]; then
              ARGS="--force"
            fi
            if [ -n "${{ github.event.inputs.limit }}" ]; then
              ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
            fi
          fi
          echo "Running: python scripts/run_nightly.py $ARGS"
          python scripts/run_nightly.py $ARGS

      - name: Pipeline failed
        if: failure() && steps.pipeline.outcome == 'failure'
        run: echo "::error::Nightly pipeline failed — expand 'Run nightly pipeline' above for the Python traceback."

      - name: Upload morning report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: morning-report
          path: reports/morning_*.html
          retention-days: 7
