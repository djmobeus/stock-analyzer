# UK pipeline schedule (Europe/London)
# Run: Mon–Fri 05:00 UK → morning briefing before LSE open (08:00)
# Captures overnight RNS/news after previous session close
schedule:
  run_weekdays: [monday, tuesday, wednesday, thursday, friday]
  skip_weekdays: [saturday, sunday]
  run_time_uk: "05:00"

scoring:
  support_proximity: 0.25
  multi_tf_confluence: 0.20
  analyst_upside: 0.15
  catalyst_proximity: 0.15
  news_sentiment: 0.10
  market_regime: 0.10
  sector_relative: 0.05

# Data quality thresholds
data_quality:
  max_daily_jump_pct: 25.0
  min_price_gbx: 1.0
  max_price_gbx: 500000.0
  stale_days: 5

# Universe filters (Phase 1+)
universe:
  min_avg_volume: 500000
  min_market_cap_gbp: 300000000
  min_analyst_count: 4

# Outcome tracking (Phase 4)
outcomes:
  target_hit_pct: 8.0
  stop_loss_pct: -5.0

# Machine learning (Phase 5)
ml:
  min_samples_logistic: 100
  min_samples_forest: 300
  retrain_min_new_outcomes: 5

# Nightly pipeline performance (yfinance is I/O-bound)
pipeline:
  max_workers: 8

# Tiered universe refresh (active=daily, watch=weekly, cold=monthly)
universe_tiers:
  enabled: true
  shadow_priority_count: 15
  cold_volume_ratio: 0.50
  cold_cap_ratio: 0.50
  watch_volume_ratio: 0.70
  watch_cap_ratio: 0.70
  watch_recheck_days: 7
  cold_recheck_days: 30

# Email morning digest (Gmail SMTP)
email:
  enabled: true
  # Set EMAIL_TO in .env / GitHub secrets (e.g. you@p-mouzakis.com)

# Anthropic API cost estimates (USD per million tokens — update if pricing changes)
anthropic:
  model: claude-haiku-4-5-20251001
  input_usd_per_mtok: 1.00
  output_usd_per_mtok: 5.00

# RSS feeds for UK market news
news:
  feeds:
    - name: proactive
      url: https://www.proactiveinvestors.co.uk/rss/articles
    - name: investegate
      url: https://www.investegate.co.uk/rss/latest
