{% extends "base.html" %}
{% block title %}Sign in — UK Stock Analyzer{% endblock %}
{% block content %}
<h1>UK Stock Analyzer</h1>
<p class="muted">Enter your private app password</p>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post" action="/login" class="card" style="max-width:360px">
  <label for="password">Password</label>
  <input id="password" name="password" type="password" autofocus>
  <p style="margin-top:1rem"><button class="btn" type="submit">Sign in</button></p>
</form>
{% endblock %}
