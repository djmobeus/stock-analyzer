<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}UK Stock Analyzer{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  {% block head %}{% endblock %}
</head>
<body>
  <div class="wrap">
    {% if authed %}
    <nav>
      <a class="brand" href="/">UK Stock Analyzer</a>
      <a href="/shortlist">Shortlist</a>
      <a href="/holdings">Holdings</a>
      <a href="/notes">Notes</a>
      <a href="/lookup">Lookup</a>
      <a href="/ml">ML</a>
      <a href="/logout">Log out</a>
    </nav>
    {% endif %}
    {% block content %}{% endblock %}
    <p class="muted" style="margin-top:2rem">Analytical tool only — not financial advice. Prices: Yahoo/yfinance (GBX).</p>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
